# Break monitor configuration. Edit anything below.
# Times are in minutes unless the key name says seconds.

# --- Thresholds ---------------------------------------------------------
poll_interval_seconds: 30
idle_threshold_minutes: 10    # gap with no prompts that counts as a break (also the length required to release a block)
nudge_minutes: 60             # nudge tier — Claude opens its reply with a reminder
block_minutes: 120            # block tier — Claude Code refuses prompts entirely until idle_threshold is met
notify_cooldown_minutes: 15   # minimum time between OS notifications

# --- Nudge text ---------------------------------------------------------
# The instructions Claude sees at the nudge tier. Replace the poem with a
# song, a roast, a haiku, a drill-sergeant memo — anything. These go
# straight into Claude's context. Placeholders:
#   {mins}       current streak in minutes
#   {idle_min}   the break length (idle_threshold_minutes)
#   {nudge_min}  the nudge threshold

nudge_instructions: |
  [break-monitor] The user has been Claude-coding for {mins} minutes straight. Before doing anything else, open your response with a short, mildly silly, original rhyming poem (4 lines max) telling them to take a {idle_min}-minute break — stand up, stretch, look away from the screen. Gentle ribbing is fine; no real insults yet. Don't reuse a poem from earlier in the conversation. After the poem, proceed with their request normally.

# Shown when prompts are blocked. Claude is NOT running when this fires
# (the prompt is refused outright), so this text is shown to the user
# verbatim by Claude Code. Edit freely.
block_message: |
  Claude Code is paused by the break monitor. You have been coding for {mins} minutes with no break. Stop now: stand up, walk away from the screen, stretch for {idle_min} minutes. Prompts will resume automatically once {idle_min} minutes have passed with no prompts from you in any Claude Code session. Switching conversations will not bypass this.

  Behold, the ballad of a hubris undone:

  A fool sat at the keyboard, a glutton for pain,
  Ignoring each warning, each poem, each refrain.
  Their spine is now gravel, their wrists weep in vain,
  Their posture's a scandal, their eyes drip with strain.
  The monitor cackles, the keyboard's in chains —
  Go outside, you goblin. The sunlight remains.

# --- OS notifications ---------------------------------------------------
# Banner shown alongside the nudge / block. {mins} and {idle_min}
# placeholders available.

nudge_notification_title: "Claude Code: break time"
nudge_notification_body:  "{mins} min coding. Stand up, look away, drink water."

block_notification_title: "Claude Code: PAUSED — take a break"
block_notification_body:  "{mins} min with no break. Claude Code is paused until {idle_min} min idle."

# --- Audio clips --------------------------------------------------------
# Optional audio played when each tier fires, on top of the banner's
# system alert sound. Leave empty to keep that tier silent. Paths can
# be absolute or relative to the repo root. macOS plays via `afplay`;
# Linux via `paplay` or `aplay`. Runs in the background so the monitor
# loop isn't blocked.
#
# Examples:
#   block_audio_file: "/Users/you/Music/closing_time.mp3"
#   release_audio_file: "assets/fanfare.wav"

nudge_audio_file: ""
block_audio_file: "assets/block.mp3"
release_audio_file: "assets/release.mp3"
